<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Pirata+One&display=swap" rel="stylesheet">
<style>
  body{margin:0;-webkit-font-smoothing:antialiased;}
  @keyframes hotdPulse{0%,100%{box-shadow:0 0 0 1px #b89b5e, 0 0 14px rgba(184,155,94,0.25);}50%{box-shadow:0 0 0 1px #b89b5e, 0 0 22px rgba(184,155,94,0.6);}}
</style>
</helmet>
<div style="min-height:100vh;box-sizing:border-box;padding:44px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'EB Garamond',serif;background:radial-gradient(ellipse 80% 55% at 50% -8%, #43191d, transparent 65%), radial-gradient(circle at 50% 120%, #2a1416, transparent 55%), #15100f;">
  <div style="width:100%;max-width:960px;box-sizing:border-box;padding:36px 36px 30px;border-radius:3px;border:1px solid #6e4a26;background:radial-gradient(circle at 18% 12%, rgba(184,148,86,0.12), transparent 42%), radial-gradient(circle at 88% 85%, rgba(120,80,40,0.13), transparent 46%), linear-gradient(160deg,#f2e6c9,#ead9b4);box-shadow:0 24px 70px rgba(0,0,0,0.55), inset 0 0 0 8px rgba(244,233,205,0.5), inset 0 0 0 9px rgba(110,74,38,0.45);">

    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.34em;text-transform:uppercase;color:#8a5a30;margin-bottom:10px;">All must have been a mistake</div>
      <div style="font-family:'Pirata One',serif;font-size:54px;line-height:0.95;color:#5a161a;letter-spacing:0.01em;">House of the Dragon season 3</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-top:8px;">
        <span style="height:1px;width:70px;background:linear-gradient(90deg,transparent,#b89b5e);"></span>
        <span style="font-family:'Cinzel',serif;font-weight:700;font-size:22px;letter-spacing:0.4em;color:#a9802f;padding-left:0.4em;">BINGO</span>
        <span style="height:1px;width:70px;background:linear-gradient(90deg,#b89b5e,transparent);"></span>
      </div>
      <div style="font-family:'EB Garamond',serif;font-style:italic;font-size:15px;color:#6b4a2a;margin-top:10px;">Mark each well-worn trope as it graces the realm.</div>
    </div>

    <sc-if value="{{ hasBingo }}" hint-placeholder-val="{{ false }}">
      <div style="text-align:center;margin-bottom:16px;">
        <span style="display:inline-block;font-family:'Cinzel',serif;font-weight:700;font-size:15px;letter-spacing:0.22em;color:#f1e4c6;background:linear-gradient(160deg,#6a1c20,#4a1115);border:1px solid #b89b5e;border-radius:30px;padding:9px 26px;animation:hotdPulse 1.8s ease-in-out infinite;">✦ BINGO — THE THRONE IS WON ✦</span>
      </div>
    </sc-if>

    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:9px;">
      <sc-for list="{{ cells }}" as="cell" hint-placeholder-count="25">
        <div style="{{ cell.style }}" onClick="{{ cell.onClick }}" style-hover="transform:translateY(-2px);box-shadow:0 7px 16px rgba(60,30,15,0.28);">
          <sc-if value="{{ cell.isFree }}" hint-placeholder-val="{{ false }}">
            <div style="font-family:'Cinzel',serif;font-size:20px;color:#caa45c;line-height:1;margin-bottom:6px;">❦</div>
          </sc-if>
          <sc-if value="{{ cell.isWritein }}" hint-placeholder-val="{{ false }}">
            <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.24em;color:#9a6a2e;margin-bottom:5px;">WILD</div>
          </sc-if>
          <span style="{{ cell.textStyle }}">{{ cell.text }}</span>
          <sc-if value="{{ cell.showStamp }}" hint-placeholder-val="{{ false }}">
            <div style="{{ cell.stampStyle }}">{{ cell.stampGlyph }}</div>
          </sc-if>
        </div>
      </sc-for>
    </div>

    <div style="display:flex;gap:14px;justify-content:center;margin-top:24px;">
      <button onClick="{{ reshuffle }}" style="font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#f1e4c6;background:linear-gradient(160deg,#6a1c20,#4a1115);border:1px solid #b89b5e;border-radius:3px;padding:11px 24px;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.28);" style-hover="background:linear-gradient(160deg,#7d2227,#5a161a);">New Card</button>
      <button onClick="{{ clear }}" style="font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#5a3a1e;background:transparent;border:1px solid #9a7434;border-radius:3px;padding:11px 24px;cursor:pointer;" style-hover="background:rgba(154,116,52,0.12);">Clear Marks</button>
    </div>

    <div style="text-align:center;margin-top:18px;font-family:'EB Garamond',serif;font-style:italic;font-size:12px;color:#9a7a52;">A fan-made amusement of the Crownlands — tap a tile when the omen appears.</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 1040, &quot;height&quot;: 1040},
  &quot;house&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Targaryen Black&quot;, &quot;Hightower Green&quot;], &quot;default&quot;: &quot;Targaryen Black&quot;, &quot;tsType&quot;: &quot;string&quot;},
  &quot;markStyle&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;check&quot;, &quot;cross&quot;, &quot;seal&quot;], &quot;default&quot;: &quot;seal&quot;, &quot;tsType&quot;: &quot;string&quot;}
}">
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.entries = [
      'Dragon screeches at the end of episode',
      '"What would you have me do?"',
      '"Brother."',
      '"Cousin."',
      '"Sister."',
      '"Nephew."',
      'Sneaking in behind enemy lines',
      'Wearing armor at sea',
      'Teleportation',
      'Retconning events from previous seasons',
      'Rhaenyra sighs incredulously',
      'Laenor returns',
      'Jacaerys blue-steels',
      'Posing with dragon in random location',
      'Daenerys reference',
      'Battle aftermath episode opener',
      'Patriarchy bad',
      'Inconsequential plot line',
      'Impossibly correct assumption',
      'Impossible knowledge',
      'Pivotal misunderstanding',
      'Harold returns',
      'Dragon sneak attack from below',
      'Cut past important battle'
    ];
    this.STORE = 'hotd-bingo-v3';
    this.state = this.load();
  }

  load(){
    try{
      const raw = localStorage.getItem(this.STORE);
      if(raw){
        const d = JSON.parse(raw);
        if(d && Array.isArray(d.layout) && d.layout.length === 25){
          return { layout: d.layout, marked: d.marked || {} };
        }
      }
    }catch(e){}
    return this.fresh();
  }

  fresh(){
    const items = this.entries.map((_, i) => i); // 24 entries fill the 24 non-centre cells
    for(let i = items.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      const t = items[i]; items[i] = items[j]; items[j] = t;
    }
    const layout = [];
    let k = 0;
    for(let p = 0; p < 25; p++){
      if(p === 12) layout.push('free');
      else layout.push(items[k++]);
    }
    return { layout, marked: {} };
  }

  persist(s){
    try{ localStorage.setItem(this.STORE, JSON.stringify({ layout: s.layout, marked: s.marked })); }catch(e){}
  }

  toggle(pos){
    if(this.state.layout[pos] === 'free') return;
    this.setState(s => {
      const marked = { ...s.marked };
      if(marked[pos]) delete marked[pos]; else marked[pos] = true;
      const ns = { ...s, marked };
      this.persist(ns);
      return ns;
    });
  }

  reshuffle(){
    const ns = this.fresh();
    this.persist(ns);
    this.setState(ns);
  }

  clear(){
    this.setState(s => {
      const ns = { ...s, marked: {} };
      this.persist(ns);
      return ns;
    });
  }

  isMarked(pos){
    return pos === 12 ? true : !!this.state.marked[pos];
  }

  winningPositions(){
    const lines = [];
    for(let r = 0; r < 5; r++) lines.push([0,1,2,3,4].map(c => r*5 + c));
    for(let c = 0; c < 5; c++) lines.push([0,1,2,3,4].map(r => r*5 + c));
    lines.push([0,6,12,18,24]);
    lines.push([4,8,12,16,20]);
    const win = new Set();
    for(const ln of lines){
      if(ln.every(p => this.isMarked(p))) ln.forEach(p => win.add(p));
    }
    return win;
  }

  accent(){
    const h = this.props.house;
    if(h === 'Hightower Green'){
      return { deep:'#1d3322', mid:'#2c5233', tint1:'#dde6cd', tint2:'#c5d3a8', stamp:'rgba(40,86,46,0.7)', glow:'#7f9b5c', gold:'#b89b5e' };
    }
    return { deep:'#3a0e12', mid:'#5a161a', tint1:'#efd9c8', tint2:'#e4c3ad', stamp:'rgba(150,22,26,0.7)', glow:'#c79a4a', gold:'#b89b5e' };
  }

  glyph(){
    const m = this.props.markStyle || 'seal';
    return m === 'check' ? '\u2713' : m === 'cross' ? '\u2715' : '\u2766';
  }

  cellStyle(o){
    const a = this.accent();
    const s = {
      position:'relative', minHeight:'130px', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', textAlign:'center', padding:'12px 10px',
      cursor: o.isFree ? 'default' : 'pointer', borderRadius:'2px', userSelect:'none',
      overflow:'hidden', transition:'background .25s, box-shadow .2s, transform .12s',
      border:'1px solid rgba(74,42,28,0.32)',
      background:'linear-gradient(145deg,#f7eedb,#efe2c4)',
      boxShadow:'inset 0 0 0 3px rgba(247,238,219,0.55), inset 0 0 18px rgba(120,80,40,0.07)'
    };
    if(o.isWritein){
      s.border = '1px dashed rgba(138,106,46,0.85)';
      s.background = 'linear-gradient(145deg,#f4ead0,#ecdfbe)';
    }
    if(o.marked && !o.isFree){
      s.background = 'linear-gradient(145deg,' + a.tint1 + ',' + a.tint2 + ')';
    }
    if(o.isFree){
      s.background = 'radial-gradient(circle at 50% 35%, ' + a.mid + ', ' + a.deep + ')';
      s.border = '1px solid ' + a.gold;
      s.boxShadow = 'inset 0 0 0 3px rgba(184,155,94,0.35), 0 0 14px rgba(0,0,0,0.25)';
    }
    if(o.winning){
      s.border = '1px solid ' + a.gold;
      s.boxShadow = 'inset 0 0 0 3px rgba(184,155,94,0.6), 0 0 0 2px ' + a.glow + ', 0 0 16px ' + a.glow;
    }
    return s;
  }

  textStyle(o){
    if(o.isFree) return { fontFamily:"'Cinzel',serif", fontWeight:700, letterSpacing:'0.2em', fontSize:'16px', color:'#e3c179' };
    if(o.isWritein) return { fontFamily:"'EB Garamond',serif", fontStyle:'italic', fontSize:'15px', color:'#6b4a2a', lineHeight:1.2 };
    const isQuote = typeof o.text === 'string' && o.text.charAt(0) === '"';
    return { fontFamily:"'EB Garamond',serif", fontWeight:500, fontStyle: isQuote ? 'italic' : 'normal', fontSize:'15px', color: o.marked ? '#5a2f1e' : '#2a1a12', lineHeight:1.18 };
  }

  stampStyle(){
    const a = this.accent();
    return {
      position:'absolute', width:'90px', height:'90px', borderRadius:'50%',
      border:'3px solid ' + a.stamp, display:'flex', alignItems:'center', justifyContent:'center',
      transform:'rotate(-11deg)', color:a.stamp, fontFamily:"'Cinzel',serif", fontWeight:700,
      fontSize:'30px', boxShadow:'inset 0 0 0 2px rgba(60,20,12,0.08)', pointerEvents:'none'
    };
  }

  renderVals(){
    const win = this.winningPositions();
    const stamp = this.stampStyle();
    const g = this.glyph();
    const cells = this.state.layout.map((id, pos) => {
      const isFree = id === 'free';
      const isWritein = id === 'w';
      const marked = this.isMarked(pos);
      const winning = win.has(pos);
      let text;
      if(isFree) text = 'FREE';
      else if(isWritein) text = 'your own omen';
      else text = this.entries[id];
      return {
        pos, text, isFree, isWritein, marked, winning,
        showStamp: marked && !isFree,
        stampStyle: stamp,
        stampGlyph: g,
        style: this.cellStyle({ isFree, isWritein, marked, winning, text }),
        textStyle: this.textStyle({ isFree, isWritein, marked, text }),
        onClick: () => this.toggle(pos)
      };
    });
    return {
      cells,
      hasBingo: win.size > 0,
      reshuffle: () => this.reshuffle(),
      clear: () => this.clear()
    };
  }
}
</script>
</body>
</html>
